name: Build IAP God Pro
on:
  push:
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          xcrun -sdk iphoneos clang -arch arm64 -dynamiclib \
            -mios-version-min=14.0 \
            -framework Foundation \
            -framework StoreKit \
            -framework Security \
            -o IAP_God_Pro.dylib \
            hypic_vip.m \
            -Xlinker -dead_strip
      - uses: actions/upload-artifact@v4
        with:
          name: IAP_God_Pro-dylib
          path: IAP_God_Pro.dylib
