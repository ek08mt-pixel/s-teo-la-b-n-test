name: Build IAP God Dylib
on:
  push:
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          xcrun -sdk iphoneos clang -arch arm64 -dynamiclib \
            -mios-version-min=14.0 \
            -framework Foundation \
            -framework StoreKit \
            -o IAP_God.dylib \
            iap_god.m \
            -Xlinker -dead_strip
      - uses: actions/upload-artifact@v4
        with:
          name: IAP_God-dylib
          path: IAP_God.dylib
